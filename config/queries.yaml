queries:
  - name: "Query1"
    sentence: "Find a substitute material for PFAS material THV (elastomeric terpolymer of tetrafluoroethylene, hexafluoropropylene, and vinylidene fluoride) that has broad chemical resistance, including acids, bases, protic and aprotic solvents, oils, and salt solutions. Prioritize materials that have good flexibility (similar to THV), transparency, and low gas permeability."
    material_X: "elastomeric terpolymer of tetrafluoroethylene, hexafluoropropylene, and vinylidene fluoride"
    application_Y: "broad chemical resistance"
  - name: "Query2"
    sentence: "Identify non-fluoropolymer thermoplastics that can withstand severe thermal shock, specifically direct immersion into liquid nitrogen (−196 °C) and maintain structural integrity (no cracking, embrittlement, or catastrophic failure). Please note that silicone doesn't account for thermoplastics. The identified material can be formulated to allow extrusion into films and injection molding components."
    material_X: "Fluoropolymer thermoplastics"
    application_Y: "Severe thermal shock"
  - name: "Query3"
    sentence: "Identify non-fluoropolymer thermoplastic material for heat shrink tubing that could replace FEP heat shrink tubing with an application/service temperature of up to 180 °C and a shrink temperature under 250 °C. Additionally, evaluate whether specific material formulations or processing approaches could help meet these performance requirements."
    material_X: "Fluorinated Ethylene Propylene (FEP)"
    application_Y: "Heat shrink tubing"
  - name: "Query4"
    sentence: "Identify a PFAS-free thermoplastic material for heat shrink tubing with a 2:1 shrink ratio that could replace FEP heat shrink tubing, with an application/service temperature of up to ~200 °C and a shrink temperature under 250 °C."
    material_X: "Fluorinated Ethylene Propylene (FEP)"
    application_Y: "Heat shrink tubing with a 2:1 shrink ratio"
  - name: "Query5"
    sentence: "What non-PFAS additives or formulation strategies can be used in thermoplastics to achieve low coefficient of friction (COF), good release / anti-stick behavior, and low surface energy?"
    material_X: "PFAS-based low-friction/anti-stick additives (e.g. PTFE)"
    application_Y: "low coefficient of friction, anti-stick release, and low surface energy"
  - name: "Query6"
    sentence: "Beyond PEEK, which thermoplastic materials can withstand continuous or intermittent use up to 200 °C, offer good chemical compatibility with acids, bases, organic solvents, and oils, and be co-extruded with softer polymers such as TPU, TPE, or TPV (e.g., in multilayer or jacketed constructions)?"
    material_X: "PEEK"
    application_Y: "high-temperature thermoplastic co-extrudable with TPU/TPE/TPV"
